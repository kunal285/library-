<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Management System - Books</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Library Management Dashboard</h1>
      <button id="loadAllBtn" class="btn primary">Load Data</button>
    </header>

    <main class="container">
      <nav class="tabs">
        <a class="tab-btn active" href="books.html">Books</a>
        <a class="tab-btn" href="members.html">Members</a>
        <a class="tab-btn" href="issues.html">Issued Books</a>
        <a class="tab-btn" href="categories.html">Categories</a>
        <a class="tab-btn" href="staff.html">Staff</a>
        <a class="tab-btn" href="reservations.html">Reservations</a>
        <a class="tab-btn" href="stats.html">Statistics</a>
        <a class="tab-btn" href="about.html">About</a>
      </nav>

      <section id="alertBox" class="alert hidden"></section>
      <section id="loadingBox" class="loading hidden">Loading...</section>

      <section class="tab-content active">
        <div class="card">
          <h2>➕ Add Book</h2>
          <form id="bookForm" class="form-grid">
            <input type="text" id="bookTitle" placeholder="Title" required />
            <input type="text" id="bookAuthor" placeholder="Author" required />
            <input type="text" id="bookIsbn" placeholder="ISBN (Optional)" />
            <input type="text" id="bookPublisher" placeholder="Publisher (Optional)" />
            <input type="text" id="bookGenre" placeholder="Genre" required />
            <input type="number" id="bookYear" placeholder="Published Year" required />
            <input type="number" id="bookTotalCopies" placeholder="Total Copies" min="0" required />
            <input type="number" id="bookCopies" placeholder="Available Copies" min="0" required />
            <input type="number" id="bookCategoryId" placeholder="Category ID (Optional)" min="1" />
            <button type="submit" class="btn success">➕ Add Book</button>
          </form>
        </div>

        <div class="card">
          <div class="card-head">
            <h2>📖 Books List</h2>
            <button id="availableBooksBtn" class="btn secondary">📚 Show Available Books</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>🆔 ID</th>
                  <th>📕 Title</th>
                  <th>✍️ Author</th>
                  <th>📊 ISBN</th>
                  <th>🏷️ Category</th>
                  <th>📅 Year</th>
                  <th>📦 Total</th>
                  <th>✅ Available</th>
                </tr>
              </thead>
              <tbody id="booksTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
